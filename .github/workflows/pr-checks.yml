name: PR Checks

on:
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: Lint and Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f omniscope-mvp/backend/requirements.txt ]; then pip install -r omniscope-mvp/backend/requirements.txt; fi
          pip install flake8 pytest

      - name: Lint
        run: |
          flake8 omniscope-mvp/backend

      - name: Run tests
        run: |
          pytest omniscope-mvp/backend -q
