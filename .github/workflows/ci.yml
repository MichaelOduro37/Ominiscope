name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r omniscope-mvp/backend/requirements.txt
          pip install pre-commit
      - name: Run linters
        working-directory: omniscope-mvp/backend
        run: |
          pre-commit run --all-files
      - name: Run tests
        working-directory: omniscope-mvp/backend
        run: |
          python -m pytest -q
